{% extends "base.html" %}

{% block content %}

    <h2>Stock List</h2>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Product</th>
            <th>Quantity</th>
        </tr>
    </thead>
    <tbody>
        {% for product in products %}
        <tr>
            <td>{{ product.name }}</td>
            <td>{{ product.stock}}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>



{% endblock %}
