<!DOCTYPE html>
<html>
<head>
    <title>Register - Expense Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width: 400px;">
    <h2 class="text-center mb-4">Register</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert {% if message.tags %}alert-{{ message.tags }}{% else %}alert-info{% endif %}" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

        <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">
                    Create Account
                </button>
            </form>



    <p class="text-center mt-3 text-muted">Or continue with</p>

    <div class="d-flex justify-content-between gap-2">
        <a href="/accounts/google/login/"
           class="btn btn-light border d-flex align-items-center justify-content-center flex-grow-1"
           style="font-weight: 500;">
            <img src="https://developers.google.com/identity/images/g-logo.png"
                 alt="Google logo" style="width:20px; margin-right:10px;">
            Google
        </a>

        <a href="/accounts/github/login/"
           class="btn btn-light border d-flex align-items-center justify-content-center flex-grow-1"
           style="font-weight: 500;">
            <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                 alt="GitHub logo" style="width:20px; margin-right:10px;">
            GitHub
        </a>
    </div>

    <p class="mt-3 text-center">
        Already have an account? <a href="{% url 'login' %}">Login here</a>
    </p>
</div>
</body>
</html>
