{% extends "base.html" %}

{% block content %}

<h2>{% if form.instance.pk %}Update Sale{% else %}Add Sale{% endif %}</h2>

<form method="post" autocomplete="off">
    {% csrf_token %}

    {{ form.non_field_errors }}

    <div class="mb-3">
        <label for="{{ form.product.id_for_label }}">Product</label>
        {{ form.product }}
        {{ form.product.errors }}
    </div>

    <div class="mb-3">
        <label for="{{ form.quantity.id_for_label }}">Quantity</label>
        {{ form.quantity }}
        {{ form.quantity.errors }}
    </div>

    <button type="submit" class="btn btn-success">
        {% if form.instance.pk %}Update{% else %}Add{% endif %}
    </button>

    <a href="{% url 'expenses:expense_list' %}" class="btn btn-secondary">Cancel</a>

</form>

{% endblock %}
